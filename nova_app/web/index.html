<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nova Dashboard - Administración de lugares turísticos">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nova Dashboard">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Nova Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Loading screen */
    body {
      margin: 0;
      padding: 0;
    }

    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #06B6A4 0%, #0891b2 100%);
      flex-direction: column;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      font-weight: 500;
    }

    /* Ocultar loading cuando Flutter cargue */
    .loaded #loading {
      display: none;
    }
  </style>
</head>
<body>
<div id="loading" class="loading-container">
  <div class="loading-spinner"></div>
  <div class="loading-text">🔄 Cargando Nova Dashboard...</div>
</div>

<script>
  // Ocultar loading cuando Flutter esté listo
  window.addEventListener('load', function() {
    setTimeout(function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.display = 'none';
      }
      document.body.classList.add('loaded');
    }, 3000);
  });

  // Manejar errores de carga
  window.addEventListener('error', function(e) {
    const loading = document.getElementById('loading');
    if (loading) {
      loading.innerHTML = '<div style="text-align: center;">⚠️ Error cargando la aplicación<br><small>Recarga la página</small></div>';
    }
  });
</script>

<script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
