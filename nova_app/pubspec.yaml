name: nova_app
description: "Nova App - Aplicación móvil para escaneo de QR"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # 📦 Paquetes actualizados
  mobile_scanner: ^7.1.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  http: ^1.2.0
  shared_preferences: ^2.2.3
  google_sign_in: ^6.1.1  # ✅ Google Sign-In

  # 📦 PAQUETES ADICIONALES RECOMENDADOS (opcionales)
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.0
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_192.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon_1024.png"
    background_color: "#06B6A4"
    theme_color: "#06B6A4"
  windows:
    generate: false