name: nova_app
description: "Nova App - Aplicación móvil para escaneo de QR"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # 📦 Paquetes actualizados
  mobile_scanner: ^7.1.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  http: ^1.2.0
  shared_preferences: ^2.2.3
  google_sign_in: ^6.1.1  # ✅ Google Sign-In

  # 📦 PAQUETES ADICIONALES RECOMENDADOS (opcionales)
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.0
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/