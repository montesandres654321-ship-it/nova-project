<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA App Dashboard</title>
  <meta name="description" content="Panel de administración NOVA App - Turismo Golfo de Morrosquillo">
  <meta name="theme-color" content="#06B6A4">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta property="og:title" content="NOVA App Dashboard">
  <meta property="og:description" content="Turismo inteligente en el Golfo de Morrosquillo">
  <meta property="og:image" content="icons/Icon-512.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #06B6A4, #0891b2);
      color: white;
      flex-direction: column;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div id="loading" class="loading">
  <div class="spinner"></div>
  <div>Iniciando NOVA App Dashboard...</div>
</div>

<script>
  if (window.flutterWebRenderer) {
    window.flutterWebRenderer = "html";
  }

  window.addEventListener('load', function() {
    setTimeout(function() {
      const loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    }, 3000);
  });
</script>

<script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
