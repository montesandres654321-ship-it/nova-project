name: nova_dashboard
description: Dashboard administrativo para Nova App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2

  # HTTP & Networking
  http: ^1.1.2

  # State Management & Storage
  shared_preferences: ^2.2.2

  # Date & Time
  intl: ^0.18.1

  # Charts & Visualization
  fl_chart: ^0.66.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.0  # ✅ AGREGADO - Para imprimir/exportar PDFs avanzados

  # QR Code Generation
  qr_flutter: ^4.1.0  # ✅ AGREGADO - CRÍTICO para qr_dialog.dart

  # File Handling
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  path_provider: ^2.1.2

  # URL Launcher
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - images/
  #   - icons/
